<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🏕</div>
      <h1 class="logo-name">CampConnect</h1>
    </div>

    <div class="back-row">
      <button class="back-btn" (click)="goToLogin()">
        ← Retour à la connexion
      </button>
    </div>

    <div class="auth-header">
      <div class="header-icon">🔑</div>
      <h2 class="auth-title">Mot de passe oublié</h2>
      <p class="auth-subtitle">
        Entrez votre email et nous vous enverrons un code de réinitialisation.
      </p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">
      <span class="alert-icon">!</span> {{ errorMessage }}
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
      <span class="alert-icon">✓</span> {{ successMessage }}
      <br><small>Redirection en cours...</small>
    </div>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" class="auth-form" *ngIf="!successMessage">

      <div class="field">
        <label class="field-label">Email <span class="required">*</span></label>
        <div class="input-wrapper">
          <span class="input-prefix">✉</span>
          <input
            class="field-input has-prefix"
            [(ngModel)]="email"
            name="email"
            type="email"
            required
            placeholder="votre@email.com"
            #emailRef="ngModel"
            [class.invalid]="emailRef.invalid && emailRef.touched">
        </div>
        <span class="field-error" *ngIf="emailRef.invalid && emailRef.touched">
          Email invalide
        </span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="forgotForm.invalid || loading">
        <span class="btn-spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Envoyer le code</span>
        <span *ngIf="loading">Envoi en cours...</span>
      </button>

    </form>

  </div>
</div>
