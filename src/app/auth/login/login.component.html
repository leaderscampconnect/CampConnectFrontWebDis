<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">🏕</div>
      <h1 class="logo-name">CampConnect</h1>
      <p class="logo-sub">Votre plateforme de camping</p>
    </div>

    <!-- Header -->
    <div class="auth-header">
      <h2 class="auth-title">Connexion</h2>
      <p class="auth-subtitle">Bienvenue ! Connectez-vous à votre compte.</p>
    </div>

    <!-- Alerte -->
    <div class="alert alert-error" *ngIf="errorMessage">
      <span class="alert-icon">!</span>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">

      <div class="field">
        <label class="field-label">Email <span class="required">*</span></label>
        <div class="input-wrapper">
          <span class="input-prefix">✉</span>
          <input
            class="field-input has-prefix"
            [(ngModel)]="email"
            name="email"
            type="email"
            required
            placeholder="votre@email.com"
            #emailRef="ngModel"
            [class.invalid]="emailRef.invalid && emailRef.touched">
        </div>
        <span class="field-error" *ngIf="emailRef.invalid && emailRef.touched">
          Email invalide
        </span>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="field-label">Mot de passe <span class="required">*</span></label>
          <button type="button" class="forgot-link" (click)="goToForgotPassword()">
            Mot de passe oublié ?
          </button>
        </div>
        <div class="input-wrapper">
          <span class="input-prefix">🔒</span>
          <input
            class="field-input has-prefix"
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            required
            placeholder="••••••••"
            #passwordRef="ngModel"
            [class.invalid]="passwordRef.invalid && passwordRef.touched">
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="loginForm.invalid || loading">
        <span class="btn-spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading">Connexion...</span>
      </button>

    </form>

  </div>
</div>
