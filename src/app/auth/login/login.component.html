<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏕</div>
      <h1 class="logo-name">CampConnect</h1>
      <p class="logo-sub">Votre plateforme de camping</p>
    </div>

    <div class="auth-header">
      <h2 class="auth-title">Connexion</h2>
      <p class="auth-subtitle">Bienvenue ! Connectez-vous à votre compte.</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">
      <span class="alert-icon">!</span>
      <span>{{ errorMessage }}</span>
    </div>

    <div class="auth-form">
      <p class="auth-subtitle">
        L'authentification est sécurisée et centralisée avec Keycloak.
      </p>

      <button
        type="button"
        class="btn-submit"
        [disabled]="loading"
        (click)="signIn()">
        <span class="btn-spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Se connecter avec Keycloak</span>
        <span *ngIf="loading">Redirection...</span>
      </button>
    </div>
  </div>
</div>
