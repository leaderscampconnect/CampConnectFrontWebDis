<section class="admin-camping-page">
  <div class="container">
    <app-camping-navbar></app-camping-navbar>

    <div class="form-card">
      <div class="form-header">
        <span class="section-tag">Create</span>
        <h3>Add Camping Site</h3>
        <p>Create a new camping destination for campers to discover and book.</p>
      </div>

      <form class="site-form" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <div class="form-group">
            <label for="nom">Name</label>
            <input
              id="nom"
              type="text"
              name="nom"
              [(ngModel)]="site.nom"
              required
            />
          </div>

          <div class="form-group">
            <label for="localisation">Location</label>
            <input
              id="localisation"
              type="text"
              name="localisation"
              [(ngModel)]="site.localisation"
              required
            />
          </div>

          <div class="form-group">
            <label for="capacite">Capacity</label>
            <input
              id="capacite"
              type="number"
              name="capacite"
              [(ngModel)]="site.capacite"
              min="1"
              required
            />
          </div>

          <div class="form-group">
            <label for="prixParNuit">Price Per Night</label>
            <input
              id="prixParNuit"
              type="number"
              name="prixParNuit"
              [(ngModel)]="site.prixParNuit"
              min="0"
              step="0.01"
              required
            />
          </div>

          <div class="form-group full-width">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              [(ngModel)]="site.description"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="form-group full-width">
            <label for="statutDispo">Status</label>
            <select
              id="statutDispo"
              name="statutDispo"
              [(ngModel)]="site.statutDispo"
              required
            >
              <option value="AVAILABLE">Available</option>
              <option value="FULL">Full</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="image">Site Image</label>
            <input
              id="image"
              type="file"
              name="image"
              accept="image/*"
              (change)="onFileSelected($event)"
              required
            />
            <small class="input-hint">
              JPG, PNG or WebP recommended.
            </small>
          </div>
        </div>

        <div class="form-actions">
          <a class="btn-secondary" routerLink="/admin/campings">
            Cancel
          </a>

          <button type="submit" class="btn-primary">
            Save Site
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
