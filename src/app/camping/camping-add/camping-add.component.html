<section class="section create-section">
  <div>
    <p class="eyebrow">Owner Workspace</p>
    <h2>Add New Camping Site</h2>
  </div>

  @if (message()) {
    <div class="feedback success">{{ message() }}</div>
  }
  @if (error()) {
    <div class="feedback error">{{ error() }}</div>
  }

  @if (auth.hasAnyRole('SITE_OWNER', 'ADMIN')) {
    <form [formGroup]="campingForm" (ngSubmit)="createCamping()">
      <label>
        Name
        <input formControlName="nom" placeholder="Pine Tree Camp">
      </label>
      <label>
        Location
        <input formControlName="localisation" placeholder="Ain Draham Forest">
      </label>
      <label class="full-width">
        Description
        <textarea formControlName="description" rows="4" placeholder="Describe the camping site facilities..."></textarea>
      </label>
      <label>
        Capacity (People)
        <input type="number" formControlName="capacite" min="1">
      </label>
      <label>
        Price per Night (TND)
        <input type="number" formControlName="prixParNuit" min="0" step="0.5">
      </label>

      <button class="button button-primary full-width" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating...' : 'Create Camping Site' }}
      </button>
    </form>
  } @else {
    <p class="empty-state error">You must be a SITE OWNER to add a new camping site.</p>
  }
</section>
